{% extends "base.html" %}
{% block title %}500 — Server Error{% endblock %}
{% block content %}
<div class="error-page">
    <div class="error-code">500</div>
    <h3 class="section-title mb-2">Something Went Wrong</h3>
    <p style="color:var(--text-secondary);max-width:400px;margin:0 auto 2rem;">
        An unexpected error occurred on our end. Please try again in a moment.
    </p>
    <a href="{{ url_for('index') }}" class="btn btn-primary px-4">
        <i class="bi bi-arrow-clockwise me-2"></i>Try Again
    </a>
</div>
{% endblock %}
